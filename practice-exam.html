<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Certified Architect — Practice Exam</title>
<!-- Plausible Analytics: replace YOUR_DOMAIN with your actual domain after deployment -->
<script defer data-domain="YOUR_DOMAIN" src="https://plausible.io/js/script.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    background: #f7f7f5;
    color: #1a1a1a;
    min-height: 100vh;
    line-height: 1.6;
    padding-bottom: 0;
  }

  .shell { max-width: 800px; margin: 0 auto; padding: 40px 28px 100px; }

  /* ── top bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 10px;
  }
  .qnum-label { font-size: 13px; color: #e05c2a; font-weight: 600; }
  .scenario-tag {
    font-size: 12px; color: #555;
    background: #fff; border: 1px solid #e0e0e0;
    padding: 4px 12px; border-radius: 20px;
  }

  /* ── progress ── */
  .prog-wrap { margin-bottom: 32px; }
  .prog-track { background: #e8e8e8; border-radius: 4px; height: 3px; }
  .prog-fill  { height: 100%; background: #1a1a1a; border-radius: 4px; transition: width .3s ease; }

  /* ── question text ── */
  .q-text {
    font-size: 16px; color: #111; line-height: 1.8;
    margin-bottom: 32px; font-weight: 400;
  }
  code {
    font-family: 'SF Mono','Fira Code',monospace;
    background: #f0f0ee; color: #1a5276;
    padding: 1px 6px; border-radius: 3px; font-size: 13.5px;
    border: 1px solid #ddd;
  }

  /* ── options ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: border-color .12s, background .12s, box-shadow .12s;
  }
  .opt:hover:not(.locked) { border-color: #aaa; background: #fafafa; }
  .opt.locked  { cursor: default; }
  .opt.chosen  { border: 2.5px solid #1a1a1a; background: #e8e8e8; box-shadow: 0 0 0 3px rgba(26,26,26,0.12); }
  .opt.chosen .opt-circle { background: #1a1a1a; }
  .opt.correct { border-color: #16a34a; background: #f0fdf4; }
  .opt.wrong   { border-color: #dc2626; background: #fef2f2; }
  .opt.reveal  { border-color: #16a34a; background: #f0fdf4; }

  .opt-circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-top: 1px;
  }
  .opt.correct .opt-circle,
  .opt.reveal  .opt-circle  { background: #16a34a; }
  .opt.wrong   .opt-circle  { background: #dc2626; }

  .opt-text { font-size: 14.5px; color: #333; line-height: 1.6; }
  .opt.correct .opt-text,
  .opt.reveal  .opt-text  { color: #14532d; }
  .opt.wrong   .opt-text  { color: #7f1d1d; }

  /* ── inline feedback (correct/incorrect only — no answer reveal) ── */
  .feedback-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 22px; margin-bottom: 4px;
  }
  .feedback-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }
  .feedback-pill.pass { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .feedback-pill.fail { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

  /* ── explanation (section-review only) ── */
  .expl {
    padding: 16px 20px;
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    font-size: 13.5px; color: #555; line-height: 1.75;
    margin-top: 14px;
  }
  .expl strong { color: #222; }

  /* ── section review ── */
  .sec-review-header {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    padding: 24px 28px; margin-bottom: 32px;
  }
  .sec-review-score { font-size: 52px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .sec-review-score.good { color: #16a34a; }
  .sec-review-score.ok   { color: #d97706; }
  .sec-review-score.bad  { color: #dc2626; }
  .sec-review-label { font-size: 14px; color: #888; margin-top: 6px; }

  .review-qblock { margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid #ebebeb; }
  .review-qblock:last-child { border-bottom: none; margin-bottom: 0; }
  .review-qnum { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #bbb; margin-bottom: 8px; }
  .review-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; margin-left: 10px;
  }
  .review-badge.ok  { background: #dcfce7; color: #15803d; }
  .review-badge.bad { background: #fee2e2; color: #b91c1c; }

  /* ── buttons ── */
  .btn {
    padding: 12px 28px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; border: none;
    transition: opacity .12s, transform .1s;
  }
  .btn:hover:not(:disabled)  { opacity: .88; }
  .btn:active:not(:disabled) { transform: scale(.98); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-ghost   { background: #fff; color: #555; border: 1.5px solid #ddd; }

  /* ── start screen ── */
  #start-screen { text-align: center; padding: 56px 0 24px; }
  .start-eyebrow {
    display: inline-block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: #e05c2a; margin-bottom: 20px;
  }
  #start-screen h1 {
    font-size: 36px; font-weight: 700; color: #111;
    letter-spacing: -1.2px; margin-bottom: 16px; line-height: 1.15;
  }
  #start-screen p { font-size: 15px; color: #777; max-width: 480px; margin: 0 auto 36px; line-height: 1.7; }

  .domain-table {
    max-width: 540px; margin: 0 auto 40px;
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden;
  }
  .domain-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid #f0f0f0; font-size: 13.5px;
  }
  .domain-row:last-child { border-bottom: none; }
  .domain-row span  { color: #555; }
  .domain-row strong { color: #111; font-weight: 500; }
  .domain-qcount { font-size: 12px; color: #e05c2a; font-weight: 600; }

  /* ── section summary ── */
  .sec-card {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    padding: 28px; margin-bottom: 32px; text-align: center;
  }
  .sec-score { font-size: 56px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
  .sec-score.good { color: #16a34a; }
  .sec-score.ok   { color: #d97706; }
  .sec-score.bad  { color: #dc2626; }
  .sec-score-sub  { font-size: 14px; color: #888; margin-top: 6px; }

  /* ── final ── */
  #final-screen { text-align: center; }
  .ring-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .ring {
    width: 130px; height: 130px; border-radius: 50%;
    border: 5px solid #e0e0e0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring.pass { border-color: #16a34a; }
  .ring.fail { border-color: #dc2626; }
  .ring-pct     { font-size: 32px; font-weight: 700; color: #111; line-height: 1; }
  .ring-verdict { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

  .breakdown-card {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    overflow: hidden; margin-bottom: 40px; text-align: left;
  }
  .breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 20px; border-bottom: 1px solid #f0f0f0; font-size: 14px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row span { color: #666; }

  /* ── missed log ── */
  .missed-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .missed-domain { font-size: 11px; color: #e05c2a; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .missed-q { font-size: 14px; color: #222; margin-bottom: 14px; line-height: 1.65; }
  .missed-yours { font-size: 13px; color: #dc2626; margin-bottom: 4px; }
  .missed-right { font-size: 13px; color: #16a34a; margin-bottom: 12px; }
  .missed-expl { font-size: 13px; color: #666; border-top: 1px solid #f0f0f0; padding-top: 12px; line-height: 1.7; }
  .missed-ref { font-size: 11px; color: #bbb; margin-top: 8px; font-style: italic; }

  .section-eyebrow {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: #aaa; margin-bottom: 16px;
  }
  hr.divider { border: none; border-top: 1px solid #e8e8e8; margin: 40px 0; }

  /* ── study guides ── */
  .study-topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 10px;
  }
  .study-dots { display: flex; gap: 8px; align-items: center; }
  .study-dot {
    width: 28px; height: 4px; border-radius: 2px; background: #e0e0e0; transition: background .2s;
  }
  .study-dot.active { background: #1a1a1a; }
  .study-dot.done   { background: #16a34a; }

  /* domain header */
  .study-header { margin-bottom: 32px; }
  .study-eyebrow { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 8px; }
  .study-title { font-size: 30px; font-weight: 700; color: #111; letter-spacing: -.8px; line-height: 1.15; margin-bottom: 6px; }
  .study-weight { font-size: 13px; color: #aaa; }

  /* hook — the big opening insight */
  .study-hook {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 12px;
    padding: 28px 32px; margin-bottom: 24px;
    border-left: 4px solid var(--domain-color, #1a1a1a);
  }
  .study-hook p { font-size: 16px; line-height: 1.8; color: #333; margin: 0; }
  .study-hook p + p { margin-top: 12px; }
  .study-hook strong { color: #111; }

  /* concept sections */
  .study-concept {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    padding: 24px 28px; margin-bottom: 16px;
  }
  .concept-title {
    font-size: 15px; font-weight: 700; color: #111; margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .concept-title .num {
    width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0;
    background: var(--domain-color, #555);
  }
  .concept-body { font-size: 14px; line-height: 1.75; color: #444; }
  .concept-body p { margin-bottom: 10px; }
  .concept-body p:last-child { margin-bottom: 0; }
  .concept-body strong { color: #111; }

  /* inline tables inside concepts */
  .study-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 14px 0 4px; }
  .study-table th { text-align: left; padding: 8px 12px; background: #f8f8f8; color: #555; font-weight: 600; border-bottom: 2px solid #e8e8e8; }
  .study-table td { padding: 9px 12px; border-bottom: 1px solid #f2f2f2; color: #333; vertical-align: top; line-height: 1.5; }
  .study-table tr:last-child td { border-bottom: none; }
  .study-table td:first-child { font-weight: 500; color: #111; white-space: nowrap; }

  /* callout boxes */
  .callout {
    border-radius: 8px; padding: 14px 18px; margin: 14px 0;
    font-size: 13.5px; line-height: 1.7;
  }
  .callout-amber  { background: #fffbeb; border: 1px solid #fde68a; color: #78350f; }
  .callout-red    { background: #fef2f2; border: 1px solid #fecaca; color: #7f1d1d; }
  .callout-green  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #14532d; }
  .callout-blue   { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a5f; }
  .callout strong { font-weight: 700; }
  .callout-label  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: .7; }

  /* traps section */
  .traps-card {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    padding: 24px 28px; margin-bottom: 16px;
  }
  .traps-card h2 { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .traps-card .traps-sub { font-size: 13px; color: #aaa; margin-bottom: 18px; }
  .trap-item {
    border: 1px solid #fecaca; border-radius: 8px;
    overflow: hidden; margin-bottom: 10px;
  }
  .trap-item:last-child { margin-bottom: 0; }
  .trap-what {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 11px 14px; background: #fef2f2;
    font-size: 13.5px; font-weight: 600; color: #450a0a; line-height: 1.5;
  }
  .trap-x { flex-shrink: 0; }
  .trap-why {
    padding: 9px 14px 11px 38px;
    background: #fff5f5;
    font-size: 13px; color: #6b1515; line-height: 1.6;
    border-top: 1px solid #fecaca;
  }
  .trap-why-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #f87171; margin-bottom: 3px; }

  /* mnemonics */
  .mnemonics-card {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
    padding: 24px 28px; margin-bottom: 16px;
  }
  .mnemonics-card h2 { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 16px; }
  .mnemonic-item {
    padding: 9px 14px; border-left: 3px solid #e0e0e0;
    font-size: 13.5px; color: #444; line-height: 1.6; margin-bottom: 8px;
    background: #fafafa; border-radius: 0 6px 6px 0;
  }
  .mnemonic-item:last-child { margin-bottom: 0; }
  .mnemonic-item strong { color: #111; }

  .study-btn-row { display: flex; gap: 10px; margin-top: 32px; flex-wrap: wrap; }

  /* ── CTAs ── */
  .cta-section {
    margin-top: 48px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 36px 32px 32px;
    text-align: center;
  }
  .cta-heading { font-size: 22px; font-weight: 700; color: #111; letter-spacing: -.5px; margin-bottom: 6px; }
  .cta-sub { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.5; }
  .cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .cta-btn {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 13px 24px; border-radius: 9px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: opacity .12s, transform .1s;
    border: 1.5px solid #e0e0e0; background: #fff; color: #333;
  }
  .cta-btn:hover { opacity: .82; transform: translateY(-1px); }
  .cta-btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-size: 15px; padding: 14px 28px; }

  /* ── made-by footer ── */
  .made-by { font-size: 12px; color: #bbb; text-align: center; margin-top: 32px; }
  .made-by a { color: #bbb; text-decoration: none; }
  .made-by a:hover { color: #555; }

  /* ── persistent connect icons (top-right) ── */
  .connect-bar {
    position: fixed; top: 16px; right: 20px;
    display: flex; align-items: center; gap: 8px;
    z-index: 100;
  }
  .connect-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    text-decoration: none; transition: opacity .12s, transform .1s;
    border: 1.5px solid #e0e0e0; background: #fff; color: #555;
  }

    tag:"Domain 1", title:"Agentic Architecture & Orchestration", weight:"27% of scored content", color:"#f97316",
    hook:`<p>An agent is a loop: ask Claude what to do next, do it, tell Claude what happened, repeat. The complexity isn't in the loop — it's in two questions most developers get wrong.</p><p>First: <strong>which decisions belong in code vs. in the prompt?</strong> When a wrong action causes financial harm, you need code-level enforcement. Prompts comply ~99% of the time — which means 1% of the time they don't, and for a refund operation, that's unacceptable. Second: <strong>when something goes wrong, where did it actually break?</strong> Subagents faithfully execute their brief. If the brief was wrong, the coordinator that wrote it is the problem, not the subagent.</p>`,
    concepts:[
      { title:"The Agentic Loop",
        body:`<p>Claude communicates its intent through <code>stop_reason</code>. When it returns <code>"tool_use"</code>, Claude is saying "I need this to continue." Your code runs the tool, appends the result, and loops. When it returns <code>"end_turn"</code>, Claude has everything it needs.</p><p>A subtle trap: Claude can return a text block <em>and</em> a tool_use block in the same response — "Let me look that up" followed by the actual tool call. Checking for text content to detect completion will terminate the loop too early. <strong>stop_reason is the only reliable signal.</strong></p><div class="callout callout-amber"><div class="callout-label">Three anti-patterns (all wrong answers)</div>Parsing "I'm done" in the response text &nbsp;·&nbsp; Using iteration caps as the primary stop mechanism &nbsp;·&nbsp; Checking content type instead of stop_reason</div>` },
      { title:"Hub-and-Spoke: How Multi-Agent Systems Are Wired",
        body:`<p>In a multi-agent system, the coordinator sits at the centre and every subagent is a spoke. All communication flows through the coordinator — subagents never talk to each other. This isn't just a preference; it's what enables observability, consistent error handling, and controlled information flow.</p><p>Subagents operate with <strong>isolated context windows</strong>. They don't inherit the coordinator's history. Everything a subagent needs must be explicitly included in its prompt. When output is shallow or incomplete, the question is always "what was missing from the brief?" not "why did the subagent fail?"</p><table class="study-table"><thead><tr><th>Symptom</th><th>Root cause (trace upstream)</th></tr></thead><tbody><tr><td>Missing topics in output</td><td>Coordinator's decomposition was too narrow</td></tr><tr><td>Duplicated work, doubled token spend</td><td>Coordinator didn't partition scope across agents</td></tr><tr><td>Shallow output across every topic</td><td>Subagent prompts or tool budgets need fixing</td></tr><tr><td>Citations vanished from final report</td><td>Context-passing lost the metadata (URL, source, date)</td></tr></tbody></table>` },
      { title:"Hooks vs. Prompts: When Stakes Decide",
        body:`<p>The question isn't "should I use a hook or a prompt?" It's "what happens if this fails once?" If the answer involves financial loss, a security breach, or a regulatory violation: you need a hook. Prompts are probabilistic. Hooks are deterministic.</p><div class="callout callout-amber"><div class="callout-label">Rule to memorise verbatim</div>Single failure causes financial loss, security breach, or regulatory harm → <strong>programmatic enforcement (hooks)</strong>. Single failure causes only a bad-but-recoverable UX → <strong>prompts</strong>.</div><table class="study-table"><thead><tr><th>Hook</th><th>Fires</th><th>Common uses</th></tr></thead><tbody><tr><td>PreToolUse</td><td>Before the tool executes</td><td>Authorization gates, prerequisite checks, capturing prior state for audit, blocking over-limit refunds</td></tr><tr><td>PostToolUse</td><td>After the tool, before model sees result</td><td>Normalizing formats (timestamps, currencies), redacting PII, trimming verbose responses</td></tr></tbody></table>` },
      { title:"Task Decomposition Patterns",
        body:`<p>Not every problem needs a multi-agent system. The exam tests whether you can match the pattern to the situation. The Evaluator-Optimiser pattern — iterate until quality criteria are met — breaks down the moment the evaluator can't objectively distinguish good output from bad. Vague criteria cause infinite loops.</p><table class="study-table"><thead><tr><th>Pattern</th><th>Use when</th><th>Signal phrase</th></tr></thead><tbody><tr><td>Fixed Sequential Pipeline</td><td>Each step consumes prior step's output, stable structure</td><td>"Every request follows the same flow"</td></tr><tr><td>Dynamic Decomposition</td><td>Role-typed subagents: search / analyse / synthesise</td><td>"Same roles invoked, scope varies per query"</td></tr><tr><td>Orchestrator–Worker</td><td>Uniform workers differentiated only by assigned scope</td><td>"N research workers, each handling a subtopic"</td></tr><tr><td>Evaluator–Optimiser</td><td>Output quality is <em>objectively</em> checkable</td><td>"Iterate until citations pass / coverage threshold reached"</td></tr></tbody></table>` },
      { title:"Parallel Execution, Local Recovery, and the Retry Trap",
        body:`<p><strong>Parallel subagents</strong> require emitting multiple <code>Task</code> tool calls in a <em>single coordinator response</em>. Emitting them across separate turns means sequential execution — each turn waits for the prior to complete. This is one of the most commonly misunderstood mechanics in multi-agent systems.</p><p><strong>Local error recovery:</strong> when a subagent encounters a recoverable failure — a parsing exception, a corrupted file section, a library timeout — it should handle that locally and only propagate truly unresolvable failures to the coordinator. Having the coordinator retry the entire subagent for every routine error is expensive and unnecessary. Subagents should return partial results with a flag explaining what was skipped.</p><p><strong>The paired-fix pattern:</strong> when an agent retries failed requests, two independent things must both be correct. First, error classification — only retry transient errors, not permanent ones. Second, idempotency keys — generate a unique key per operation on the first attempt and pass it on every retry, so the server can deduplicate without double-processing. Either fix alone is insufficient.</p><div class="callout callout-amber"><div class="callout-label">The paired-fix rule</div>Retry policy broken + no idempotency keys = double charges. Fixing only one leaves the other gap open. You need both.</div>` }

    hook:`<p>Claude's only signal for choosing between tools is the description you wrote. If two descriptions feel interchangeable, Claude will pick between them somewhat randomly — and adding prompting, few-shot examples, or a routing classifier won't fix a description problem. It just adds cost on top of the actual issue.</p><p>The other thing the exam tests hard: <strong>the difference between a tool that couldn't reach its data source versus one that looked and found nothing.</strong> These require opposite responses from the coordinator. If your error handling conflates them, recovery logic breaks entirely.</p>`,
    concepts:[
      { title:"Tool Descriptions Are the Routing Layer",
        body:`<p>The model reads descriptions to decide which tool to call. That makes the description a routing mechanism, not just documentation. "Analyzes content and extracts key information" and "analyzes documents and extracts key information" are essentially the same description — the model will route randomly between them.</p><p>The fix-ranking when you have a misrouting problem:</p><table class="study-table"><thead><tr><th>Step</th><th>Action</th><th>Why</th></tr></thead><tbody><tr><td>1st — correct</td><td>Expand tool descriptions</td><td>Low effort, fixes root cause</td></tr><tr><td>2nd</td><td>Few-shot examples in system prompt</td><td>Treats the symptom; adds token overhead</td></tr><tr><td>3rd</td><td>Merge the tools</td><td>Loses useful specialisation, high refactor cost</td></tr><tr><td>4th — wrong</td><td>Train a routing classifier</td><td>New model call, new latency, new failure point</td></tr></tbody></table><div class="callout callout-amber"><div class="callout-label">The hidden trap</div>Even with perfect descriptions, a system prompt instruction like "Always look up the customer first" creates a keyword-tool association that overrides them. After fixing descriptions, audit the system prompt for conflicting instructions.</div>` },

      { title:"tool_choice, Built-in Tools, and Scoped Tool Access",
        body:`<p>Three modes for <code>tool_choice</code>: "auto" lets the model decide whether to call a tool at all. "any" forces a call to something from the list. A named tool forces a specific tool — use this when a step must always happen first, not when document type varies (forcing one schema on mixed documents breaks the others).</p><table class="study-table"><thead><tr><th>Value</th><th>Guarantees</th><th>When to use</th></tr></thead><tbody><tr><td>"auto"</td><td>Nothing — plain text is a valid response</td><td>When not calling a tool is fine</td></tr><tr><td>"any"</td><td>A tool will be called; model picks which</td><td>Guaranteed structured output, unknown document type</td></tr><tr><td>{"type":"tool","name":"X"}</td><td>This specific tool is called</td><td>Forcing a mandatory first step</td></tr></tbody></table><p><strong>Principle of least privilege:</strong> give each agent only the tools it needs for its role. Giving a synthesis agent all web search tools because it needs to "occasionally verify a fact" is the wrong fix — give it a scoped <code>verify_fact</code> tool instead. Too many tools degrade selection reliability and invite misuse across specialisations.</p><p><strong>MCP configuration:</strong> team-shared MCP servers go in <code>.mcp.json</code> at the project root — version-controlled, automatically available to every developer on clone. Personal or experimental servers go in <code>~/.claude.json</code> — not committed to git. Credentials should never be hardcoded: use environment variable expansion (<code>\&#36;{GITHUB_TOKEN}</code>) so the config file can be committed safely.</p><p>For built-in tools: <strong>Grep searches file contents</strong> (what does the code say?). <strong>Glob matches file paths</strong> (what files exist?). Confusing these makes tasks impossible or wastes significant time.</p>` }

    hook:`<p>The exam distinguishes prompting that <em>looks</em> helpful from prompting that actually changes behaviour. "Be conservative" sounds useful. It changes nothing, because it doesn't tell the model what to include or exclude. "Flag only when claimed behaviour contradicts actual code — skip style preferences" is specific enough to work.</p><p>The other central idea: <strong>match the mechanism to the failure mode.</strong> Inconsistent output → few-shot examples. Hallucinated required fields → nullable schema. Syntax-invalid JSON → tool_use. Reviewing your own work → independent instance. Using the wrong mechanism is the exam's most common distractor pattern.</p>`,
    concepts:[
      { title:"Specific Criteria vs. Vague Confidence Instructions",
        body:`<p>When you tell a model "only report high-confidence findings," you haven't told it what to report or skip. The model will continue applying whatever judgment it was already applying, just with more hedging language.</p><p>What works: <strong>define categories explicitly</strong>. "Report: bugs, security vulnerabilities, logic errors. Skip: minor style preferences, local idioms, TODO markers." The model now has a decision rule it can actually apply, not a vague adjective to self-evaluate against.</p><p>One non-obvious fix: when one review category has a very high false positive rate, developers start ignoring <em>all</em> findings — even accurate ones in other categories. The right short-term fix is to <strong>disable the noisy category entirely</strong>, restore trust in what remains, then fix that category's prompt before re-enabling.</p>` },
      { title:"Few-Shot Examples: When and How Many",
        body:`<p>When detailed instructions produce inconsistent output across runs, the problem isn't that instructions are too short — they're too abstract. A few concrete examples showing the exact output shape give the model a pattern to replicate, not just rules to interpret.</p><p>Right amount: <strong>2–4 examples, targeted at ambiguous cases</strong>. More examples of straightforward cases don't help. Examples that show reasoning ("I flagged this, not that, because...") generalise better than examples that only show the output format.</p><div class="callout callout-green"><div class="callout-label">Recognition signal</div>"Detailed instructions produce inconsistent output across runs" → add few-shot examples. Not more instructions. Not lower temperature. Not 10 examples covering every case.</div>` },

      { title:"The Message Batches API",
        body:`<p>50% cost savings but no guaranteed latency — processing can take up to 24 hours. The choice is simple: <strong>if anyone or anything is waiting for the result, use the synchronous API.</strong> If the result will be consumed later, use batch.</p><p>Additional constraint: the Batches API does not support multi-turn tool calling within a single request. If your workflow needs the model to call tools and return results mid-conversation, it must be synchronous.</p><table class="study-table"><thead><tr><th>Workflow</th><th>API</th></tr></thead><tbody><tr><td>Pre-merge check — developer waits</td><td>Synchronous</td></tr><tr><td>Overnight technical debt report</td><td>Batch (50% savings)</td></tr><tr><td>Any multi-turn tool-calling workflow</td><td>Synchronous only</td></tr></tbody></table>` },
      { title:"Multi-Pass Review and Inline Rationale",
        body:`<p><strong>Attention dilution:</strong> when a single review pass processes many files at once, the model gives inconsistent depth — detailed on some files, superficial on others, and may flag identical patterns differently in different files. Larger context windows don't solve this; they just provide more to dilute across.</p><p>The architectural fix: split into <strong>per-file local analysis passes</strong> (one focused pass per file, consistent depth) followed by a <strong>separate cross-file integration pass</strong> examining data flow, shared state, and interface consistency across the codebase. This is the multi-pass review architecture.</p><p><strong>Inline rationale as a bottleneck fix:</strong> when developers must click into each finding to read reasoning before deciding whether to address or dismiss it, the bottleneck is investigation time — not the number of findings. The fix is requiring Claude to include a brief inline rationale with each finding: the specific rule violated and why this instance isn't a known-acceptable pattern. Developers can triage at a glance without navigating to each finding.</p><div class="callout callout-blue"><div class="callout-label">Don't confuse these two problems</div><strong>False positive rate</strong> → fix with specific categorical criteria (what to flag vs. skip)<br><strong>Investigation time bottleneck</strong> → fix with inline rationale (embed the reasoning in the finding itself)</div>` }

    tag:"Domain 5", title:"Context Management & Reliability", weight:"15% of scored content", color:"#dc2626",
    hook:`<p>Summarization destroys the precise details you need most — and the model never tells you it lost them. It just answers confidently with vaguer information. "$247.83 refund by Friday" becomes "a refund" and "soon." The model has no idea this is wrong.</p><p>The pattern that saves you: <strong>anything that must survive compression needs to live in structured form, outside the summarized history.</strong> Persistent fact blocks for transactional data. Structured error responses so recovery decisions can be made. Scratchpad files for findings that need to outlast the context window.</p>`,
    concepts:[
      { title:"Progressive Summarization and the Persistent Facts Block",
        body:`<p>As conversations grow long, Claude compresses earlier turns. The compression is lossy and disproportionately destroys high-precision tokens: specific dollar amounts, exact dates, order IDs, percentages, customer-stated deadlines. These become vague prose.</p><p>The fix: extract transactional facts into a structured block that gets injected verbatim into every prompt — completely outside the summarized history, never touched by compression.</p><div class="callout callout-blue"><code>&lt;case_facts&gt;<br>Customer: #4471 | Order: #8891<br>Refund: $247.83 | Deadline: Friday 2026-05-22<br>&lt;/case_facts&gt;</code></div><p>The second problem: the "lost in the middle" effect. Models reliably attend to the beginning and end of long inputs but may miss content buried in the middle. Mitigation: put key findings summaries at the very beginning of long aggregated inputs, and use explicit section headers to create structural anchors throughout.</p>` },
      { title:"Escalation: Explicit Always Beats Inferred",
        body:`<p>The exam tests a deceptively simple question: when should an agent escalate? The answer hinges on explicit vs. inferred signals.</p><p>When a customer <em>explicitly</em> says "I want a human," the agent escalates immediately — no investigation, no attempt to resolve first. Sentiment is not a reliable proxy. A frustrated customer might have a straightforward issue. An agent that escalates based on tone rather than explicit request will under-resolve easy cases and over-escalate hard ones.</p><table class="study-table"><thead><tr><th>Situation</th><th>Correct action</th></tr></thead><tbody><tr><td>Customer explicitly requests a human</td><td>Escalate immediately — do not investigate first</td></tr><tr><td>Policy gap or exception request</td><td>Escalate — the agent cannot invent policy</td></tr><tr><td>Unable to make meaningful progress</td><td>Escalate after legitimate avenues tried</td></tr><tr><td>Customer sounds frustrated (no explicit request)</td><td>Acknowledge, offer to resolve; escalate only if reiterated</td></tr><tr><td>Low self-reported model confidence</td><td>Not a valid trigger — poorly calibrated signal</td></tr></tbody></table>` },
      { title:"Error Propagation: Structured Context Enables Recovery",
        body:`<p>When a subagent fails, it has two options: silently return empty results, or return structured error context. The first option prevents all recovery — the coordinator can't distinguish "nothing found" from "network was down." The second lets the coordinator make an informed decision.</p><p>Structured error context needs four things: what failed (failure type), what was attempted (specific query), what partial results were recovered, and what alternatives might succeed.</p><div class="callout callout-amber"><div class="callout-label">The distinction that enables recovery</div><strong>isError: true</strong> (access failure) → tool couldn't reach the source → consider retry<br><strong>isError: false + empty</strong> (valid empty) → tool looked and found nothing → no retry needed</div>` },
      { title:"Graceful Degradation and Coverage Annotations",
        body:`<p>When some subagents succeed and others fail in a multi-agent research pipeline, the right response is <strong>graceful degradation</strong> — not halting until all results are available, and not silently omitting the missing topics. The synthesis should proceed using what's available and explicitly annotate which topic areas have coverage gaps due to unavailable sources.</p><p>This matters because "the web search agent timed out on two source categories" is genuinely useful information for the reader of the final report. Silently omitting those topic areas misleads the consumer. Halting synthesis wastes the work already done by agents that succeeded.</p><div class="callout callout-blue"><div class="callout-label">Coverage annotation pattern</div>Structure synthesis output with explicit sections distinguishing well-supported findings from areas with limited coverage — and state which source categories were unavailable. Let the reader decide how to weight the gaps.</div><p>This is also how to handle conflicting data from credible sources: don't resolve the conflict, annotate it. Report both values with full source attribution. "Government report: 40% growth. Industry analysis: 12% growth. Sources conflict — both included." Averaging invents a number neither source reported.</p>` },
      { title:"Managing Context in Long Sessions",
        body:`<p>Long exploratory sessions accumulate verbose output that becomes less relevant over time. When context fills up, the model starts referencing "typical patterns" instead of specific findings — the key details have been pushed out.</p><table class="study-table"><thead><tr><th>Strategy</th><th>Best for</th></tr></thead><tbody><tr><td>/compact</td><td>Context is full but still valid — compress and continue</td></tr><tr><td>Scratchpad files</td><td>Findings that must survive compaction or a crash</td></tr><tr><td>Subagent delegation</td><td>Deep dives that would flood the coordinator's context</td></tr><tr><td>Fresh session + injected summary</td><td>Prior tool results are stale — not just numerous</td></tr></tbody></table><p>Two things the exam distinguishes: conflicting data from two credible sources should be <strong>reported as both values with attribution</strong> — never averaged, never silently resolved. And aggregate accuracy (97% overall) can mask very high error rates on specific document types or fields — always validate by segment before automating.</p>` }

// ─────────────────────────────────────────────────────
// INDEX HELPERS
// ─────────────────────────────────────────────────────
// secStart[di] = first global flat index for domain di
const secStart = [];
let _acc = 0;
DOMAINS.forEach(d => { secStart.push(_acc); _acc += d.qs.length; });
const TOTAL = _acc;

function globalIdx(di, qi) { return secStart[di] + qi; }
function domainOf(gIdx) { // returns {di, qi}
  for (let di = DOMAINS.length-1; di >= 0; di--) {
    if (gIdx >= secStart[di]) return { di, qi: gIdx - secStart[di] };
  }
}

// ─────────────────────────────────────────────────────
// STATE
// phases: 'start' | 'question' | 'sec-review' | 'final'
// ─────────────────────────────────────────────────────
function fresh() {
  return { phase:'start', studyIdx:0, secIdx:0, qInSec:0, answers:Array(TOTAL).fill(null), checked:Array(TOTAL).fill(false), missed:[] };
}
let S = fresh();

function curGIdx() { return globalIdx(S.secIdx, S.qInSec); }
function secDone()  { return S.qInSec >= DOMAINS[S.secIdx].qs.length; }

// ─────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML =
    S.phase==='start'      ? html_start()      :
    S.phase==='study'      ? html_study()      :
    S.phase==='question'   ? html_question()   :
    S.phase==='sec-review' ? html_sec_review() :
                             html_final();
  bind();
}

// ── STUDY ──
function html_study() {
  const d = STUDY[S.studyIdx];
  const isLast = S.studyIdx === STUDY.length - 1;
  const dots = STUDY.map((_,i)=>`<div class="study-dot ${i===S.studyIdx?'active':i<S.studyIdx?'done':''}"></div>`).join('');

  const concepts = d.concepts.map((c,i)=>`
    <div class="study-concept">
      <div class="concept-title">
        <div class="num" style="background:${d.color}">${i+1}</div>
        ${c.title}
      </div>
      <div class="concept-body">${c.body}</div>
    </div>`).join('');

  const traps = d.traps.map(t=>{
    const parts = t.text.split(' — ');
    const what = parts[0];
    const why  = parts.slice(1).join(' — ');
    return `
    <div class="trap-item">
      <div class="trap-what"><span class="trap-x">✗</span><span>${what}</span></div>
      ${why ? `<div class="trap-why"><div class="trap-why-label">Why it's wrong</div>${why}</div>` : ''}
    </div>`;
  }).join('');

  const mnemonics = d.mnemonics.map(m=>`<div class="mnemonic-item">${m}</div>`).join('');

  return `
  <div class="study-topbar">
    <div class="study-dots">${dots}</div>
    <button class="btn btn-ghost" id="skip-to-exam-btn" style="font-size:12px;padding:6px 14px">Skip to Exam →</button>
  </div>

  <div class="study-header">
    <div class="study-eyebrow">${d.tag} of ${STUDY.length} &nbsp;·&nbsp; ${d.weight}</div>
    <div class="study-title">${d.title}</div>
  </div>

  <div class="study-hook" style="--domain-color:${d.color}">${d.hook}</div>

  ${concepts}

  <div class="traps-card">
    <h2>Common Exam Traps</h2>
    <div class="traps-sub">These are the wrong answers the exam uses as distractors. Each one looks plausible — here's why it fails.</div>
    ${traps}
  </div>

  <div class="mnemonics-card">
    <h2>Quick-fire mnemonics</h2>
    <div class="traps-sub">Short rules to recall under pressure. Each one resolves an exam question in one step.</div>
    ${mnemonics}
  </div>

  <div class="study-btn-row">
    ${S.studyIdx > 0 ? `<button class="btn btn-ghost" id="prev-study-btn">← Previous</button>` : ''}

      ${isLast ? 'Start Exam →' : 'Next Domain →'}
    </button>
  </div>`;
}

// ── QUESTION (no answer reveal — correct/incorrect only) ──
function html_question() {
  const di   = S.secIdx;
  const qi   = S.qInSec;
  const gi   = globalIdx(di, qi);
  const item = DOMAINS[di].qs[qi];
  const d    = DOMAINS[di];
  const chosen  = S.answers[gi];
  const checked = S.checked[gi];
  const answered = chosen !== null;

  // global progress
  const answered_so_far = S.answers.filter(a=>a!==null).length;
  const pct = Math.round(answered_so_far / TOTAL * 100);

  // per-section progress label
  const secLabel = `${d.tag}: Q${qi+1} of ${d.qs.length}`;

  const opts = item.opts.map((opt,oi)=>{
    let cls = 'opt' + (checked?' locked':'');
    if (!checked && oi===chosen)                             cls+=' chosen';
    if (checked && oi===chosen && chosen===item.correct)     cls+=' correct';
    if (checked && oi===chosen && chosen!==item.correct)     cls+=' wrong';
    return `<div class="${cls}" data-oi="${oi}">
      <div class="opt-circle">${'ABCD'[oi]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  const feedbackHtml = checked ? `
    <div class="feedback-row">
      <div class="feedback-pill ${chosen===item.correct?'pass':'fail'}">
        ${chosen===item.correct ? '✓ Correct' : '✗ Incorrect'}
      </div>
    </div>` : '';

  const isLastInSec = qi === d.qs.length - 1;
  const nextLabel   = isLastInSec ? `Review Section →` : 'Next Question →';
  const action = checked
    ? `<button class="btn btn-primary" id="next-btn">${nextLabel}</button>`
    : `<button class="btn btn-primary" id="check-btn" ${!answered?'disabled':''}>Check Answer</button>`;

  return `
  <div class="topbar">
    <div class="qnum-label">${secLabel}</div>
    <div class="scenario-tag">Scenario: ${item.scenario}</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="q-text">${item.q}</div>
  <div class="options" id="opts">${opts}</div>
  ${feedbackHtml}
  <div style="margin-top:${checked?'20px':'28px'}">${action}</div>`;
}

// ── SECTION REVIEW (full reveal at end of section) ──
function html_sec_review() {
  const di = S.secIdx;
  const d  = DOMAINS[di];
  let correct = 0;
  d.qs.forEach((_,qi)=>{ if(S.answers[globalIdx(di,qi)]===d.qs[qi].correct) correct++; });
  const total = d.qs.length;
  const pct   = Math.round(correct/total*100);
  const sc    = pct>=80?'good':pct>=60?'ok':'bad';
  const isLast = di === DOMAINS.length-1;

  const qReview = d.qs.map((item,qi)=>{
    const gi     = globalIdx(di,qi);
    const chosen = S.answers[gi];
    const ok     = chosen===item.correct;

    const opts = item.opts.map((opt,oi)=>{
      let cls = 'opt locked';
      if (oi===item.correct)          cls+=' correct';
      else if (oi===chosen && !ok)    cls+=' wrong';
      return `<div class="${cls}">
        <div class="opt-circle">${'ABCD'[oi]}</div>
        <div class="opt-text">${opt}</div>
      </div>`;
    }).join('');

    return `
    <div class="review-qblock">
      <div class="review-qnum">
        Q${qi+1}
        <span class="review-badge ${ok?'ok':'bad'}">${ok?'✓ Correct':'✗ Incorrect'}</span>
      </div>
      <div class="q-text" style="font-size:15px;margin-bottom:20px">${item.q}</div>
      <div class="options" style="margin-bottom:0">${opts}</div>
      <div class="expl"><strong>Why ${'ABCD'[item.correct]} is correct:</strong><br><br>${item.exp}</div>
    </div>`;
  }).join('');

  return `
  <div class="topbar">
    <div class="qnum-label">${d.tag} — Section Review</div>
    <div class="scenario-tag">${d.title}</div>
  </div>

  <div class="sec-review-header">
    <div class="sec-review-score ${sc}">${correct}/${total}</div>
    <div class="sec-review-label">${pct}% · ${pct>=80?'Strong':pct>=60?'Needs review':'Study required'} · ${total-correct} missed</div>
  </div>

  ${qReview}

  <div style="margin-top:36px">
    <button class="btn btn-primary" id="next-sec-btn">
      ${isLast ? 'See Final Results →' : 'Next Section →'}
    </button>
  </div>`;
}

// ── FINAL ──
function html_final() {
  let nc=0;
  DOMAINS.forEach((d,di)=>d.qs.forEach((_,qi)=>{ if(S.answers[globalIdx(di,qi)]===d.qs[qi].correct)nc++; }));
  const pct    = Math.round(nc/TOTAL*100);
  const pass   = pct>=72;
  const scaled = Math.round(100+(pct/100)*900);

  const breakdown = DOMAINS.map((d,di)=>{
    const c = d.qs.filter((_,qi)=>S.answers[globalIdx(di,qi)]===d.qs[qi].correct).length;
    const p = Math.round(c/d.qs.length*100);
    const col = p>=80?'#16a34a':p>=60?'#d97706':'#dc2626';
    return `<div class="breakdown-row">
      <span>${d.tag} — ${d.title}</span>
      <strong style="color:${col}">${c}/${d.qs.length} (${p}%)</strong>
    </div>`;
  }).join('');

  const missedHtml = S.missed.length===0
    ? '<p style="text-align:center;color:#16a34a;font-size:15px;padding:24px 0">Perfect score — nothing to review.</p>'
    : S.missed.map((m,i)=>`
      <div class="missed-card">
        <div class="missed-domain">${m.domain}</div>
        <div class="missed-q">${i+1}. ${m.q}</div>
        <div class="missed-yours">✗ You chose: ${m.your}</div>
        <div class="missed-right">✓ Correct: ${m.right}</div>
        <div class="missed-expl">${m.exp}</div>
        <div class="missed-ref">Study → ${m.ref}</div>
      </div>`).join('');

  return `
  <div style="margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #e8e8e8">
    <div style="font-size:12px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600">Practice Exam · Final Results</div>
    <div style="font-size:24px;font-weight:700;color:#111;letter-spacing:-.5px">Claude Certified Architect — Foundations</div>
  </div>

  <div id="final-screen">
    <div class="ring-wrap">
      <div class="ring ${pass?'pass':'fail'}">
        <div class="ring-pct">${pct}%</div>
        <div class="ring-verdict">${pass?'PASS':'FAIL'}</div>
      </div>
    </div>
    <div style="text-align:center;font-size:15px;color:#777;margin-bottom:6px">
      Scaled score estimate: <strong style="color:#333">${scaled}/1000</strong> &nbsp;·&nbsp; passing = 720
    </div>
    <div style="text-align:center;font-size:14px;color:#aaa;margin-bottom:36px">${nc} correct out of ${TOTAL}</div>
    <div class="section-eyebrow">Domain Breakdown</div>
    <div class="breakdown-card">${breakdown}</div>
  </div>

  ${S.missed.length>0?`
  <hr class="divider">
  <div class="section-eyebrow">Missed Questions — ${S.missed.length} to review</div>
  ${missedHtml}`:''}

  <div style="text-align:center;margin-top:48px">
    <button class="btn btn-ghost" id="restart-btn">Retake Exam</button>
  </div>

  <div class="cta-section">
    <div class="cta-heading">Found this useful?</div>
    <div class="cta-sub">Built by Hamza Farooq — AI researcher, professor, and founder.<br>Connect if you're preparing for the Claude Certified Architect exam.</div>
    <div class="cta-row">
      <a class="cta-btn primary" href="https://github.com/hamzafarooq/claude-certified-architect" target="_blank" rel="noopener">

        ⭐ Star on GitHub
      </a>
      <a class="cta-btn" href="https://linkedin.com/in/hamzafarooq" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

      </a>
      <a class="cta-btn" href="https://boringbot.substack.com/" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v2.5c0 .83-.67 1.5-1.5 1.5h-13C4.67 8 4 7.33 4 6.5V4z"/><path d="M4 8v12l8-4 8 4V8"/></svg>
        Newsletter
      </a>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────
// BIND
// ─────────────────────────────────────────────────────
function bind() {
  const g = id => document.getElementById(id);

  // start
  g('start-btn')&&g('start-btn').addEventListener('click',()=>{
    track('Exam Started', { mode: 'skip_study' });
    S.phase='question'; render(); scrollTo(0,0);
  });

  // study
  g('study-btn')&&g('study-btn').addEventListener('click',()=>{
    track('Exam Started', { mode: 'study_first' });
    S.phase='study'; S.studyIdx=0; render(); scrollTo(0,0);
  });
  g('next-study-btn')&&g('next-study-btn').addEventListener('click',()=>{
    if(S.studyIdx >= STUDY.length-1){ S.phase='question'; }
    else { S.studyIdx++; }
    render(); scrollTo(0,0);
  });
  g('prev-study-btn')&&g('prev-study-btn').addEventListener('click',()=>{
    if(S.studyIdx > 0){ S.studyIdx--; render(); scrollTo(0,0); }
  });
  g('skip-to-exam-btn')&&g('skip-to-exam-btn').addEventListener('click',()=>{
    S.phase='question'; render(); scrollTo(0,0);
  });

  // restart
  g('restart-btn')&&g('restart-btn').addEventListener('click',()=>{
    S=fresh(); render(); scrollTo(0,0);
  });

  // select option (during question phase)
  document.querySelectorAll('.opt[data-oi]').forEach(el=>{
    el.addEventListener('click',()=>{
      const gi = curGIdx();
      if(S.checked[gi]) return;            // already checked
      S.answers[gi]=parseInt(el.dataset.oi);
      render();
    });
  });

  // check answer — show correct/incorrect only
  g('check-btn')&&g('check-btn').addEventListener('click',()=>{
    const gi   = curGIdx();
    const item = DOMAINS[S.secIdx].qs[S.qInSec];
    S.checked[gi] = true;
    const chosen = S.answers[gi];
    if(chosen !== item.correct) {
      S.missed.push({
        domain:`${DOMAINS[S.secIdx].tag}: ${DOMAINS[S.secIdx].title}`,
        q:item.q,
        your:`${'ABCD'[chosen]}) ${item.opts[chosen]}`,
        right:`${'ABCD'[item.correct]}) ${item.opts[item.correct]}`,
        exp:item.exp, ref:DOMAINS[S.secIdx].ref
      });
    }
    render();
    document.querySelector('.feedback-row')?.scrollIntoView({behavior:'smooth',block:'nearest'});
  });

  // next question within section
  g('next-btn')&&g('next-btn').addEventListener('click',()=>{
    const isLastInSec = S.qInSec >= DOMAINS[S.secIdx].qs.length - 1;
    if(isLastInSec) { S.phase='sec-review'; }
    else            { S.qInSec++; }
    render(); scrollTo(0,0);
  });

  // after section review — go to next section or final
  g('next-sec-btn')&&g('next-sec-btn').addEventListener('click',()=>{
    if(S.secIdx >= DOMAINS.length-1) {
      S.phase='final';
      // compute final score for tracking
      let nc=0;
      DOMAINS.forEach((d,di)=>d.qs.forEach((_,qi)=>{ if(S.answers[globalIdx(di,qi)]===d.qs[qi].correct)nc++; }));
      const pct = Math.round(nc/TOTAL*100);
      track('Exam Completed', { score: pct, passed: pct>=72 ? 'yes' : 'no' });
    }
    else { S.secIdx++; S.qInSec=0; S.phase='question'; }
    render(); scrollTo(0,0);
  });
}

render();
</script>
